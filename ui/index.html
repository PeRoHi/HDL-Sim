<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HDL-Sim IDE</title>
  <meta name="hdl-sim-ui-build" content="0.5.12" />
  <link rel="stylesheet" href="/assets/css/app.css?v=0.5.12" />
</head>
<body>
  <!-- Silos-style menu bar -->
  <nav id="menubar" class="menubar" aria-label="メインメニュー">
    <div class="menubar-brand" title="HDL-Sim UI バージョン">
      <span id="app-version" class="brand-ver">Ver 0.5.12</span>
      <span class="brand-name">HDL-Sim</span>
    </div>
    <button type="button" class="menubar-btn" data-menu="file">File</button>
    <button type="button" class="menubar-btn" data-menu="edit">Edit</button>
    <button type="button" class="menubar-btn" data-menu="view">View</button>
    <button type="button" class="menubar-btn" data-menu="project">Project</button>
    <button type="button" class="menubar-btn" data-menu="debug">Debug</button>
    <button type="button" class="menubar-btn" data-menu="window">Window</button>
    <button type="button" class="menubar-btn" data-menu="help">Help</button>
  </nav>
  <div id="menu-dropdown" class="menu-dropdown" role="menu" hidden></div>
  <div id="update-banner" class="update-banner" hidden role="status"></div>

  <!-- Simulation toolbar -->
  <header class="toolbar" role="banner">
    <div class="toolbar-left">
      <div class="toolbar-group" role="toolbar" aria-label="実行">
        <button type="button" id="btn-run" class="tb-btn primary" title="実行 (F5)" aria-label="実行">
          <svg class="tb-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 2.5v11l9-5.5z" fill="currentColor"/></svg>
          <span class="tb-label">Run</span>
        </button>
        <button type="button" id="btn-stop" class="tb-btn" title="停止" aria-label="停止" disabled>
          <svg class="tb-icon" viewBox="0 0 16 16" aria-hidden="true"><rect x="3" y="3" width="10" height="10" fill="currentColor"/></svg>
          <span class="tb-label">Stop</span>
        </button>
        <button type="button" id="btn-step" class="tb-btn" title="ステップ実行（未対応）" aria-label="ステップ">
          <svg class="tb-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M3 2.5v11l6-5.5-6-5.5zm7 0v11l6-5.5-6-5.5z" fill="currentColor"/></svg>
          <span class="tb-label">Step</span>
        </button>
        <span class="tb-sep"></span>
        <button type="button" id="btn-elab" class="tb-btn" title="階層を更新" aria-label="階層更新">
          <svg class="tb-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1l7 4v6l-7 4-7-4V5z" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M8 8l7-3M8 8v7M8 8L1 5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          <span class="tb-label">Elab</span>
        </button>
        <button type="button" id="btn-wave-toggle" class="tb-btn" title="波形パネル" aria-label="波形">
          <svg class="tb-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M1 12l3-4 3 2 4-6 4 8" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="tb-label">Waveform</span>
        </button>
      </div>
    </div>
    <div class="toolbar-center">
      <label class="tb-field tb-field-top">
        <span class="tb-field-label">Top</span>
        <select id="select-top" title="開いている .v ファイル内の module 名">
          <option value="">(auto)</option>
        </select>
      </label>
      <label class="tb-field" title="シミュレーション時間の上限（時間単位）。この時刻に達するか、イベントがなくなると停止します。">
        <span class="tb-field-label">Until</span>
        <input type="number" id="input-until" value="15000" min="0" title="停止するシミュレーション時刻（例: STEP=1000 なら 15000 以上推奨）" />
      </label>
      <label class="tb-field" title="処理するイベント数の上限。無限ループ防止用。通常は 500〜5000 で十分です。">
        <span class="tb-field-label">MaxEv</span>
        <input type="number" id="input-max-events" value="2000" min="1" title="最大イベント数（遅延・posedge などの処理回数上限）" />
      </label>
      <label class="tb-field">
        <span class="tb-field-label">例</span>
        <select id="select-example">
          <option value="">—</option>
        </select>
      </label>
    </div>
    <div class="toolbar-right">
      <span id="status-bar" class="status-pill" aria-live="polite">Ready</span>
    </div>
  </header>

  <!-- Resizable IDE body -->
  <div class="ide-root">
    <div id="split-v-top" class="split-v-top">
      <div id="split-h-main" class="split-h-main">
        <!-- Left: Explorer -->
        <aside id="pane-explorer" class="pane pane-explorer" aria-label="エクスプローラー">
          <div class="project-bar">
            <label class="project-label" for="select-project">Project</label>
            <select id="select-project" title="プロジェクト切替">
              <option value="">— workspace —</option>
            </select>
            <button type="button" id="btn-new-project" class="mini-btn" title="新規プロジェクト">New</button>
            <button type="button" id="btn-save-project" class="mini-btn" title="プロジェクトに保存">Save</button>
            <label class="project-label" for="select-spj">SPJ</label>
            <select id="select-spj" title="HDL-Sim/spj 内のプロジェクト">
              <option value="">— .spj —</option>
            </select>
            <button type="button" id="btn-open-spj" class="mini-btn" title=".spj を開く (./spj/)">Open</button>
            <button type="button" id="btn-save-spj" class="mini-btn" title=".spj として ./spj/ に保存">Save</button>
          </div>
          <div class="pane-tabs" role="tablist">
            <button type="button" class="pane-tab active" data-pane="files" role="tab" aria-selected="true">Files</button>
            <button type="button" class="pane-tab" data-pane="hierarchy" role="tab" aria-selected="false">Hierarchy</button>
          </div>
          <div class="pane-body">
            <div id="view-files" class="pane-view active" role="tabpanel">
              <div class="tree-toolbar">
                <button type="button" id="btn-open-files" class="mini-btn" title="ローカル .v / .sv ファイルを開く">Open</button>
                <button type="button" id="btn-new-file" class="mini-btn" title="空のファイルを新規作成">+ New</button>
                <button type="button" id="btn-delete-file" class="mini-btn danger" title="選択ファイルを削除">− Del</button>
                <input type="file" id="file-import-input" class="visually-hidden" multiple accept=".v,.sv,.vh,.svh,text/plain" tabindex="-1" aria-hidden="true" />
              </div>
              <div id="file-tree" class="tree-view" tabindex="0" aria-label="ワークスペースファイル"></div>
            </div>
            <div id="view-hierarchy" class="pane-view" role="tabpanel" hidden>
              <div id="hierarchy-tree" class="tree-view" tabindex="0"></div>
              <div class="signal-section">
                <div class="signal-section-header">Signals</div>
                <ul id="signal-list" class="signal-list"></ul>
              </div>
            </div>
          </div>
        </aside>

        <!-- Center: MDI workspace -->
        <section id="pane-editor" class="pane pane-editor" aria-label="エディタ">
          <div id="mdi-desktop" class="mdi-desktop" aria-label="ワークスペース">
            <div id="mdi-canvas" class="mdi-canvas"></div>
          </div>
          <div id="editor-tabs" class="editor-tabs visually-hidden" role="tablist"></div>
          <div id="editor-host" class="editor-host visually-hidden"></div>
        </section>
      </div>

      <!-- Bottom: Console -->
      <footer id="pane-console" class="pane pane-console" aria-label="コンソール">
        <div class="pane-header-bar">
          <span class="pane-title">Output</span>
          <button type="button" id="btn-copy-console" class="mini-btn" title="出力をコピー (Ctrl+C)">Copy</button>
          <button type="button" id="btn-copy-console-err" class="mini-btn" title="直近のエラーをコピー">Copy err</button>
          <button type="button" id="btn-select-console" class="mini-btn" title="出力を全選択">全選択</button>
          <button type="button" id="btn-clear-console" class="mini-btn" title="クリア">Clear</button>
        </div>
        <textarea id="console-output" class="console-output" readonly spellcheck="false" aria-label="シミュレーション出力"></textarea>
      </footer>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/split.js@1.6.5/dist/split.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script src="/assets/js/vcd-viewer.js?v=0.5.12"></script>
  <script src="/assets/js/menu-bar.js?v=0.5.12"></script>
  <script src="/assets/js/app.js?v=0.5.12" type="module"></script>
</body>
</html>
