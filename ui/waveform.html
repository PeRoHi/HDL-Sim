<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Waveform - HDL-Sim</title>
  <link rel="stylesheet" href="/assets/css/app.css?v=1.0.2" />
  <link rel="stylesheet" href="/assets/css/layout.css?v=1.0.2" />
  <link rel="stylesheet" href="/assets/css/components.css?v=1.0.2" />
  <style>
    body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; overflow: hidden; }
    .toolbar { display: flex; align-items: center; gap: 8px; padding: 8px; background: #333; border-bottom: 1px solid #444; }
    .content { display: flex; flex: 1; overflow: hidden; }
    .signal-panel-area { width: 250px; background: #252526; border-right: 1px solid #444; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-area { flex: 1; position: relative; overflow: auto; display: flex; flex-direction: column; }
    .waveform-wrap { flex: 1; position: relative; overflow-x: auto; overflow-y: hidden; background: #1e1e1e; }
    #waveform-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" id="btn-zoom-out" class="mini-btn" title="時間軸を縮小">−</button>
    <button type="button" id="btn-zoom-in" class="mini-btn" title="時間軸を拡大">＋</button>
    <button type="button" id="btn-fit" class="mini-btn" title="全体表示に戻す">Fit</button>
    <label class="wave-tick-ctrl" title="時間目盛の間隔。空または 0 で自動">
      <span class="wave-tick-label">目盛</span>
      <input type="number" id="inp-wave-tick" class="wave-tick-input" min="0" step="any" placeholder="自動" />
      <span id="wave-tick-unit" class="wave-tick-unit"></span>
    </label>
    <button type="button" id="btn-all" class="mini-btn" title="Run 後の全 VCD 信号を表示">All Signals</button>
    <label class="check"><input type="checkbox" id="chk-auto-scroll" checked /> Auto-scroll</label>
    <span id="status" style="margin-left: auto; color: #ccc; font-size: 12px;">Waiting for data...</span>
  </div>
  <div class="content">
    <div id="wave-signal-panel" class="signal-panel-area"></div>
    <div class="canvas-area">
      <div id="waveform-wrap" class="waveform-wrap">
        <canvas id="waveform-canvas"></canvas>
      </div>
    </div>
  </div>
  <script src="/assets/js/vcd-viewer.js?v=1.0.9"></script>
  <script src="/assets/js/standalone-waveform.js?v=1.0.9" type="module"></script>
</body>
</html>
